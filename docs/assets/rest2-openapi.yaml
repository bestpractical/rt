---
components:
  securitySchemes:
    basicAuth:
      description: You can access this resource via basic auth
      scheme: basic
      type: http
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
externalDocs:
  description: Find out more about this API
  url: https://docs.bestpractical.com/rt/latest/RT/REST2.html
info:
  contact:
    email: contact@bestpractical.com
  title: RT REST2 API Documentation
  version: 1.0.0
openapi: 3.0.0
paths:
  /REST/2.0/customfield/{id}:
    get:
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              example: |
                {
                   "LastUpdated" : "2024-10-10T17:13:34Z",
                   "id" : 3,
                   "LastUpdatedBy" : {
                      "id" : "RT_System",
                      "_url" : "http://localhost:10941/REST/2.0/user/RT_System",
                      "type" : "user"
                   },
                   "Description" : "",
                   "_hyperlinks" : [
                      {
                         "type" : "customfield",
                         "id" : 3,
                         "ref" : "self",
                         "_url" : "http://localhost:10941/REST/2.0/customfield/3"
                      }
                   ],
                   "UniqueValues" : "0",
                   "EntryHint" : "Enter multiple values",
                   "Pattern" : "",
                   "MaxValues" : "0",
                   "Disabled" : "0",
                   "Name" : "Multi",
                   "LookupType" : "RT::Queue-RT::Ticket",
                   "SortOrder" : "0",
                   "Creator" : {
                      "id" : "RT_System",
                      "_url" : "http://localhost:10941/REST/2.0/user/RT_System",
                      "type" : "user"
                   },
                   "Type" : "Freeform",
                   "Created" : "2024-10-10T17:13:34Z"
                }
          description: Test generated response
      security:
      - basicAuth: []
        bearerAuth: []
      summary: Get request to /REST/2.0/customfield/{id}
  /REST/2.0/ticket:
    post:
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              properties:
                Content:
                  type: string
                CustomFields:
                  properties:
                    '2':
                      type: string
                  type: object
                From:
                  type: string
                Queue:
                  type: string
                Subject:
                  type: string
                To:
                  type: string
              type: object
      responses:
        '201':
          content:
            application/json:
              example: '{"_url":"http://localhost:10941/REST/2.0/ticket/17","id":"17","type":"ticket"}'
          description: Test generated response
        '403':
          content:
            application/json:
              example: '{"message":"No permission to create tickets in the queue ''General''"}'
          description: Test generated response
      security:
      - basicAuth: []
        bearerAuth: []
      summary: Post request to /REST/2.0/ticket
